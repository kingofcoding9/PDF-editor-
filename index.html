<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>AR 3D Scanner to OBJ</title>
    <!-- Tailwind CSS for UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Three.js Import Map -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #111; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: none;
        }
        #webxr-canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* The DOM overlay is placed on top of the WebXR view */
        #dom-overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; /* Let touches pass through to WebXR unless on a button */
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 20px; 
            padding-bottom: 40px;
            box-sizing: border-box; 
            z-index: 10; 
        }
        .pointer-events-auto { pointer-events: auto; }
        .hidden { display: none !important; }
        
        /* Custom touch optimization for buttons */
        button {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
    </style>
</head>
<body>

    <!-- Startup / Error Screen -->
    <div id="start-screen" class="absolute inset-0 bg-gray-900 flex flex-col items-center justify-center z-50 p-6 text-center">
        <div class="max-w-md w-full bg-gray-800 rounded-2xl shadow-2xl p-8 border border-gray-700">
            <div class="flex justify-center mb-6">
                <svg class="w-16 h-16 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold mb-3 text-white tracking-tight">AR 3D Scanner</h1>
            <p class="text-gray-400 mb-8 text-sm leading-relaxed">
                Scan rooms or objects in real-time using your device's camera spatial data. Generate and export a complete 3D <code>.obj</code> file directly to your device.
            </p>
            
            <div id="ar-status-container" class="min-h-[60px]">
                <!-- Status messages injected here -->
                <div class="text-gray-500 animate-pulse">Initializing WebXR Engine...</div>
            </div>
        </div>
    </div>

    <!-- WebXR Canvas Container -->
    <div id="webxr-canvas-container"></div>

    <!-- AR Interface (DOM Overlay) -->
    <div id="dom-overlay" class="hidden">
        <!-- Top Header -->
        <div class="flex justify-between items-start pointer-events-auto">
            <div class="bg-black/60 backdrop-blur-md px-5 py-3 rounded-xl border border-white/10 shadow-lg">
                <span class="text-xs text-gray-400 uppercase tracking-wider font-semibold block mb-1">Voxels Mapped</span>
                <div id="point-count" class="text-3xl font-mono font-bold text-blue-400 leading-none">0</div>
            </div>
            <button id="btn-exit" class="bg-red-500/80 hover:bg-red-500 text-white p-4 rounded-full shadow-lg backdrop-blur-md transition-all active:scale-90">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <!-- Bottom Controls -->
        <div class="flex flex-col items-center gap-4 pointer-events-auto w-full max-w-md mx-auto relative">
             <button id="btn-scan" class="w-full bg-white text-black font-bold py-5 rounded-2xl shadow-[0_0_30px_rgba(255,255,255,0.2)] active:bg-gray-200 active:scale-[0.98] transition-all text-xl flex items-center justify-center gap-3 relative overflow-hidden">
                <div class="w-4 h-4 bg-red-500 rounded-full animate-pulse hidden" id="scan-indicator"></div>
                <span id="scan-text">Hold to Scan Surface</span>
            </button>
            <button id="btn-export" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg backdrop-blur-md active:scale-[0.98] transition-all flex items-center justify-center gap-2 border border-blue-400/30">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Export Mesh to .OBJ
            </button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OBJExporter } from 'three/addons/exporters/OBJExporter.js';

        // --- DOM Elements ---
        const startScreen = document.getElementById('start-screen');
        const arStatusContainer = document.getElementById('ar-status-container');
        const domOverlay = document.getElementById('dom-overlay');
        const webxrCanvasContainer = document.getElementById('webxr-canvas-container');
        
        const btnExit = document.getElementById('btn-exit');
        const btnScan = document.getElementById('btn-scan');
        const btnExport = document.getElementById('btn-export');
        const pointCountEl = document.getElementById('point-count');
        const scanIndicator = document.getElementById('scan-indicator');
        const scanText = document.getElementById('scan-text');

        // --- Core Three.js Variables ---
        let scene, camera, renderer;
        let reticle;
        let scanGroup;
        
        // --- WebXR Variables ---
        let xrSession = null;
        let hitTestSource = null;
        let hitTestSourceRequested = false;

        // --- Scanning Logic Variables ---
        let isScanning = false;
        let pointCount = 0;
        let lastPointPos = new THREE.Vector3(9999, 9999, 9999);
        const MIN_DISTANCE_M = 0.015; // Minimum distance between mapped voxels (1.5 cm)
        
        // Voxel template (A small cube placed at mapped points to form physical geometry for the OBJ)
        const voxelGeo = new THREE.BoxGeometry(0.015, 0.015, 0.015);
        const voxelMat = new THREE.MeshStandardMaterial({ 
            color: 0x44aaff, 
            roughness: 0.7, 
            metalness: 0.1 
        });

        init();

        function init() {
            // 1. Setup Scene
            scene = new THREE.Scene();

            // 2. Setup Camera
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // 3. Setup Lights (Crucial for voxel visibility)
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(1, 2, 0);
            scene.add(directionalLight);

            // 4. Setup Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            webxrCanvasContainer.appendChild(renderer.domElement);

            // 5. Setup Scanning Reticle
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.02, 0.025, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00ff00 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // 6. Setup Container for Scanned Voxels
            scanGroup = new THREE.Group();
            scene.add(scanGroup);

            // 7. Initialize WebXR Check
            checkXRAvailability();
            
            // Handle Window Resize
            window.addEventListener('resize', onWindowResize, false);

            // 8. Setup Interaction Events
            setupEvents();
        }

        function checkXRAvailability() {
            if ('xr' in navigator) {
                navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
                    if (supported) {
                        // Create Start Button
                        arStatusContainer.innerHTML = '';
                        const btnEnterAR = document.createElement('button');
                        btnEnterAR.className = 'w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-8 rounded-xl shadow-[0_0_15px_rgba(37,99,235,0.4)] transition-transform transform active:scale-[0.98] text-lg tracking-wide';
                        btnEnterAR.innerText = 'Start AR Scanner';
                        btnEnterAR.onclick = onRequestSession;
                        arStatusContainer.appendChild(btnEnterAR);
                    } else {
                        showError("WebXR 'immersive-ar' is not supported on this device/browser combination.");
                    }
                }).catch(err => {
                    showError(`WebXR check failed: ${err.message}`);
                });
            } else {
                showError("WebXR API is completely missing. Please use a compatible browser (e.g., Chrome for Android).");
            }
        }

        function showError(message) {
            arStatusContainer.innerHTML = `<div class="text-red-400 bg-red-900/30 p-4 rounded-xl border border-red-500/30 text-sm">${message}</div>`;
        }

        async function onRequestSession() {
            // Request the WebXR session with necessary AR features
            const sessionInit = {
                requiredFeatures: ['hit-test', 'local'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.getElementById('dom-overlay') }
            };

            try {
                xrSession = await navigator.xr.requestSession('immersive-ar', sessionInit);
                xrSession.addEventListener('end', onSessionEnded);
                
                // Set the session into the renderer
                renderer.xr.setReferenceSpaceType('local');
                await renderer.xr.setSession(xrSession);
                
                // Update UI state
                startScreen.classList.add('hidden');
                domOverlay.classList.remove('hidden');
                
                // Start Render Loop
                renderer.setAnimationLoop(render);
                
            } catch (err) {
                showError(`Failed to start AR Session: ${err.message}`);
            }
        }

        function onSessionEnded() {
            xrSession.removeEventListener('end', onSessionEnded);
            xrSession = null;
            hitTestSourceRequested = false;
            hitTestSource = null;
            
            // Stop loop and restore UI
            renderer.setAnimationLoop(null);
            startScreen.classList.remove('hidden');
            domOverlay.classList.add('hidden');
            
            // Do not clear the scan group here, so they can export even if they crash out of AR.
        }

        function setupEvents() {
            // Exit Button
            btnExit.addEventListener('click', () => {
                if (xrSession) xrSession.end();
            });

            // Scan Button (Press and Hold)
            const startScanning = (e) => {
                e.preventDefault(); // Prevent standard touch/mouse behavior
                isScanning = true;
                scanIndicator.classList.remove('hidden');
                scanText.innerText = "Mapping Surface...";
                btnScan.classList.replace('bg-white', 'bg-gray-100');
            };

            const stopScanning = (e) => {
                e.preventDefault();
                isScanning = false;
                scanIndicator.classList.add('hidden');
                scanText.innerText = "Hold to Scan Surface";
                btnScan.classList.replace('bg-gray-100', 'bg-white');
            };

            // Use Pointer Events for unified touch/mouse handling within the DOM Overlay
            btnScan.addEventListener('pointerdown', startScanning);
            btnScan.addEventListener('pointerup', stopScanning);
            btnScan.addEventListener('pointerleave', stopScanning);
            btnScan.addEventListener('pointercancel', stopScanning);

            // Export Button
            btnExport.addEventListener('click', exportToOBJ);
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                // 1. Manage Hit Test Source Setup
                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then((viewerSpace) => {
                        session.requestHitTestSource({ space: viewerSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    
                    // Reset if session ends unexpectedly
                    session.addEventListener('end', () => {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                    });
                    
                    hitTestSourceRequested = true;
                }

                // 2. Perform Hit Test
                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);

                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        const pose = hit.getPose(referenceSpace);
                        
                        reticle.visible = true;
                        reticle.matrix.fromArray(pose.transform.matrix);
                        
                        // 3. Process Spatial Scanning
                        if (isScanning) {
                            placeVoxelAtReticle();
                        }
                        
                    } else {
                        reticle.visible = false;
                    }
                }
            }

            // Render the scene
            renderer.render(scene, camera);
        }

        function placeVoxelAtReticle() {
            // Extract current position from the reticle's matrix
            const currentPos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
            
            // Throttle voxel placement based on spatial distance to prevent memory overflow
            if (currentPos.distanceTo(lastPointPos) > MIN_DISTANCE_M) {
                // Clone geometry/material reference to keep memory footprint low
                const voxel = new THREE.Mesh(voxelGeo, voxelMat);
                
                // Apply spatial transform
                voxel.position.copy(currentPos);
                voxel.quaternion.setFromRotationMatrix(reticle.matrix);
                
                // Add to export group
                scanGroup.add(voxel);
                
                // Update trackers
                lastPointPos.copy(currentPos);
                pointCount++;
                pointCountEl.innerText = pointCount;
            }
        }

        function exportToOBJ() {
            if (pointCount === 0) {
                alert("No points scanned yet. Scan a surface first.");
                return;
            }

            // Temporarily change button state to show processing
            const originalText = btnExport.innerHTML;
            btnExport.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Generating Mesh...`;
            
            // Defer execution slightly to allow UI to update
            setTimeout(() => {
                try {
                    // Three.js OBJExporter parses the group and calculates absolute transforms
                    const exporter = new OBJExporter();
                    const resultData = exporter.parse(scanGroup);

                    // Create binary blob from string payload
                    const blob = new Blob([resultData], { type: 'text/plain' });
                    const blobUrl = URL.createObjectURL(blob);

                    // Trigger Client-Side Download
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = blobUrl;
                    a.download = `ar_scan_${new Date().getTime()}.obj`;
                    document.body.appendChild(a);
                    a.click();
                    
                    // Cleanup
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(blobUrl), 100);
                    
                } catch (error) {
                    console.error("Export Failed:", error);
                    alert("Error exporting mesh.");
                } finally {
                    btnExport.innerHTML = originalText;
                }
            }, 50);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
